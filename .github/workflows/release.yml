name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (example: v0.0.2)'
        required: true
        default: 'v0.0.2'
      notes:
        description: 'Release notes (optional)'
        required: false
        default: ''

env:
  RELEASE_TAG: ${{ github.event.inputs.version }}

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows asset
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build and package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist, dist/stage-win -Force | Out-Null
          Push-Location win
          go mod tidy
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -ldflags "-s -w -H windowsgui" -o ../dist/stage-win/CampusNet.exe .
          Copy-Item account.ini ../dist/stage-win/account.ini -Force
          if (Test-Path info.htm) {
            Copy-Item info.htm ../dist/stage-win/info.htm -Force
          }
          Pop-Location
          Compress-Archive -Path dist/stage-win/* -DestinationPath "dist/CampusNet-windows-amd64-${env:RELEASE_TAG}.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-asset
          path: dist/CampusNet-windows-amd64-${{ env.RELEASE_TAG }}.zip

  build-openwrt:
    name: Build OpenWrt assets
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'

      - name: Build and package OpenWrt
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p dist/stage-openwrt-arm64 dist/stage-openwrt-mipsle

          cd openwrt
          go mod tidy

          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o ../dist/stage-openwrt-arm64/srunlogin .
          cp account.ini ../dist/stage-openwrt-arm64/account.ini

          GOOS=linux GOARCH=mipsle GOMIPS=softfloat go build -ldflags "-s -w" -o ../dist/stage-openwrt-mipsle/srunlogin .
          cp account.ini ../dist/stage-openwrt-mipsle/account.ini
          cd ..

          tar -czf "dist/srunlogin-openwrt-arm64-${RELEASE_TAG}.tar.gz" -C dist/stage-openwrt-arm64 .
          tar -czf "dist/srunlogin-openwrt-mipsle-${RELEASE_TAG}.tar.gz" -C dist/stage-openwrt-mipsle .

      - name: Upload OpenWrt artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-assets
          path: |
            dist/srunlogin-openwrt-arm64-${{ env.RELEASE_TAG }}.tar.gz
            dist/srunlogin-openwrt-mipsle-${{ env.RELEASE_TAG }}.tar.gz

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-openwrt
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create/Update Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.RELEASE_TAG }}
          tag_name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          body: ${{ github.event.inputs.notes }}
          files: |
            dist/CampusNet-windows-amd64-${{ env.RELEASE_TAG }}.zip
            dist/srunlogin-openwrt-arm64-${{ env.RELEASE_TAG }}.tar.gz
            dist/srunlogin-openwrt-mipsle-${{ env.RELEASE_TAG }}.tar.gz
